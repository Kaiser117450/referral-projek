version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: growthloop-postgres
    environment:
      POSTGRES_DB: growthloop_db
      POSTGRES_USER: growthloop_user
      POSTGRES_PASSWORD: growthloop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - growthloop-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: growthloop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - growthloop-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: growthloop-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://growthloop_user:growthloop_password@postgres:5432/growthloop_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: growthloop_jwt_secret_key_2024
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - growthloop-network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: growthloop-frontend
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_APP_NAME: GrowthLoop
      VITE_APP_VERSION: 1.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - growthloop-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  growthloop-network:
    driver: bridge



